<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Личный кабинет</title>
</head>
<body>
<div th:replace="~{fragments :: main-nav}"></div>
<div class="d-flex">
    <div th:replace="~{fragments :: sidebar('user')}"></div>
    <div>
        <h2>User information page</h2>
        <div class="card">
            <div class="card-header">About User</div>
            <div class="card-body">
                <table class="table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Имя</th>
                        <th>Фамилия</th>
                        <th>Возраст</th>
                        <th>Роль</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr>
                        <td th:text="${user.id}"></td>
                        <td th:text="${user.name}"></td>
                        <td th:text="${user.lastName}"></td>
                        <td th:text="${user.age}"></td>
                        <td><span th:each="role: ${user.roles}" th:text="${role.name + ' '}"></span></td>
                    </tr>
                    </tbody>
                </table>
                <form th:action="@{/logout}" method="post"><br>
                    <button type="submit">Выйти</button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
