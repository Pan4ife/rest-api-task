<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .form-signin {
            max-width: 300px;
            padding: 1rem;
        }
        .form-floating input {
            height: 40px !important;
        }
    </style>
    <title>Страница логина</title>
</head>
<body class="d-flex align-items-center py-4 bg-body-tertiary">
<main class="form-signin w-100 m-auto">
<form th:action="@{/login}" method="post" style="display:inline">
    <h4 class="text-center">Please sign in</h4>
    <div class="input-group mb-2">
        <div class="form-floating">
            <input type="text" class="form-control" id="floatingInputGroup1" placeholder="Username" name="username">
            <label for="floatingInputGroup1">Username</label>
        </div>
    </div>
    <div class="input-group mb-1">
        <div class="form-floating">
            <input type="password" class="form-control" id="floatingInputGroup2" placeholder="Password" name="password">
            <label for="floatingInputGroup2">Password</label>
        </div>
    </div>
    <div class="d-grid gap-2 col-12 mx-auto">
    <button type="submit" class="btn btn-primary">Sign in</button>
    </div>
</form>
</main>
</body>
</html>
