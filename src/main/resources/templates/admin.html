<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Страница админа</title>
</head>
<body>
<div th:replace="~{fragments :: main-nav}"></div>
<div class="d-flex">
    <div th:replace="~{fragments :: sidebar('admin')}"></div>
    <div>
        <h1>Список пользователей</h1>

        <table border="1" cellpadding="20">
            <thead>
            <tr>
                <th>ID</th>
                <th>Имя</th>
                <th>Фамилия</th>
                <th>Возраст</th>
                <th>Роли</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.id}"></td>
                <td th:text="${user.name}"></td>
                <td th:text="${user.lastName}"></td>
                <td th:text="${user.age}"></td>
                <td><span th:each="role: ${user.roles}" th:text="${role.name + ' '}"></span></td>
                <td>
                    <form th:action="@{/admin/users/{id}/edit(id=${user.id})}" method="get" style="display:inline">
                        <button type="submit">Редактировать</button>
                    </form>
                    <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post" style="display:inline">
                        <button type="submit">Удалить</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>

        <br>
        <a th:href="@{/admin/users/new}">Добавить нового пользователя</a>
        <form th:action="@{/logout}" method="post">
            <br>
            <button type="submit">Выйти</button>
        </form>
    </div>
</div>
</body>
</html>
