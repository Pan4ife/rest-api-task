<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Страница админа</title>
</head>
<body>
<div th:replace="~{fragments :: main-nav}"></div>
<div class="d-flex">
    <div th:replace="~{fragments :: sidebar('admin')}"></div>
    <div class="p-3 flex-grow-1 text-bg-light"><h1>Admin panel</h1>
        <!-----Tabs----->
        <div class="nav nav-tabs" id="nav-tab" role="tablist">
            <button class="nav-link active"
                    id="nav-home-tab" data-bs-toggle="tab" data-bs-target="#nav-home"
                    type="button" role="tab" aria-controls="nav-home" aria-selected="true">All Users
            </button>
            <button class="nav-link"
                    id="nav-profile-tab" data-bs-toggle="tab" data-bs-target="#nav-profile"
                    type="button" role="tab" aria-controls="nav-profile" aria-selected="false">New User
            </button>
            <!-----Основной контент------>
        </div>
        <div class="tab-content" id="nav-tabContent">
            <div class="tab-pane fade show active"
                 id="nav-home" role="tabpanel" aria-labelledby="nav-home-tab" tabindex="0">
                <div class="card">
                    <div class="card-header fw-bold">All users</div>
                    <div class="card-body">
                        <table class="table table-striped">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Last Name</th>
                                <th>Age</th>
                                <th>Username</th>
                                <th>Role</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody id="user-table-body">

                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            <!-----New user----->
            <div class="tab-pane fade"
                 id="nav-profile" role="tabpanel" aria-labelledby="nav-profile-tab" tabindex="0">
                <div class="card">
                    <div class="card-header"> Add new user</div>
                    <div class="card-body">
                        <form id="create-user-form">
                            <div class="mb-3 w-25 mx-auto text-center">
                                <label class="form-label fw-bold">Name</label>
                                <input type="text" name="name" pattern="[A-Za-zА-Яа-я]+"
                                       class="form-control">

                            </div>

                            <div class="mb-3 w-25 mx-auto text-center">
                                <label class="form-label fw-bold">Last Name</label>
                                <input type="text" name="lastName" pattern="[A-Za-zА-Яа-я]+"
                                       class="form-control">

                            </div>

                            <div class="mb-3 w-25 mx-auto text-center">
                                <label class="form-label fw-bold">Age</label>
                                <input type="number" name="age" class="form-control">
                            </div>

                            <div class="mb-3 w-25 mx-auto text-center">
                                <label class="form-label fw-bold">Username</label>
                                <input type="text" name="username" class="form-control">

                            </div>

                            <div class="mb-3 w-25 mx-auto text-center">
                                <label class="form-label fw-bold">Password</label>
                                <input type="password" name="password" class="form-control">

                            </div>

                            <div class="mb-3 w-25 mx-auto">
                                <label class="form-label fw-bold d-block text-center">Role</label>
                                <div id="roles-checkboxes">
                                </div>
                            </div>

                            <div class="d-flex justify-content-center">
                                <button type="submit" class="btn btn-success">Add new user</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit user</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="edit-user-form">
                <div class="modal-body">
                    <input type="hidden" name="id">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Name</label>
                        <input type="text" name="name" class="form-control" required pattern="[A-Za-zА-Яа-я]+">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Last Name</label>
                        <input type="text" name="lastName" class="form-control" required pattern="[A-Za-zА-Яа-я]+">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Age</label>
                        <input type="number" name="age" class="form-control" required min="1" max="150">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Username</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Password</label>
                        <input type="password" name="password" class="form-control"
                               placeholder="Leave blank to keep current">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Role</label>
                        <div id="edit-roles-checkboxes"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="submit" class="btn btn-info">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
<script>
    // ListOfUsers
    async function loadUsers() {
        const response = await fetch('/api/users');
        const users = await response.json();

        const tbody = document.getElementById('user-table-body');
        tbody.innerHTML = '';

        users.forEach(user => {
            const row = document.createElement('tr');
            row.innerHTML = `
            <td>${user.id}</td>
            <td>${user.name}</td>
            <td>${user.lastName}</td>
            <td>${user.age}</td>
            <td>${user.username}</td>
            <td>${user.roles.join(', ')}</td>
            <td>
            <button class="btn btn-danger" onclick="deleteUser(${user.id})">Delete</button>
            <button class="btn btn-primary" onclick="openEditModal(${user.id})">Edit</button>
            </td>

        `;
            tbody.appendChild(row);
        });
    }

    // Checkboxes
    async function loadRoles() {
        const response = await fetch('/api/roles');
        const roles = await response.json();

        const container = document.getElementById('roles-checkboxes');
        container.innerHTML = '';

        roles.forEach(role => {
            const div = document.createElement('div');
            div.className = 'form-check';
            div.innerHTML = `
            <input class="form-check-input" type="checkbox" name="roleIds" value="${role.id}" id="role-${role.id}">
            <label class="form-check-label" for="role-${role.id}">${role.name}</label>
        `;
            container.appendChild(div);
        });
    }
    //Delete
    async function deleteUser(id) {
        if (!confirm('Delete this user?')){
            return;
        }
        const response = await fetch(`/api/users/${id}`, {method: 'DELETE'})

        if (response.ok){
            loadUsers();
        }
        else {
            alert('Cannot delete user')
        }
    }

    // Create From JS
    const createForm = document.getElementById('create-user-form');

    createForm.addEventListener('submit', async (event) => {
        event.preventDefault(); //останавливает дефолтное поведение браузера после нажатия кнопки.

        const roleIds = Array.from(
            createForm.querySelectorAll('input[name="roleIds"]:checked') // находит все отмеченные чекбоксы ролей.
        ).map(checkbox => Number(checkbox.value));

        const newUser = {
            name: createForm.name.value,
            lastName: createForm.lastName.value,
            age: createForm.age.value,
            username: createForm.username.value,
            password: createForm.password.value,
            roleIds: roleIds
        };
        //Проверка валидации ошибок.
        const response = await fetch('/api/users', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(newUser)//объект JSON -> в строку(обратная операция - response.json())

        });

        if (response.ok) {
            createForm.reset(); //очистка формы после отправки.
            loadUsers();
            document.getElementById('nav-home-tab').click();
        } else {
            const errorMessage = await response.text();
            alert('Ошибка: ' + errorMessage);
        }
    });

    // Opening edit modal with user's fields by his id. Get mapping /api/users/id
    async function openEditModal(id) {
        const response = await fetch(`/api/users/${id}`);
        const user = await response.json();

        const form = document.getElementById('edit-user-form');
        form.id.value = user.id;
        form.name.value = user.name;
        form.lastName.value = user.lastName;
        form.age.value = user.age;
        form.username.value = user.username;
        form.password.value = '';

        const container = document.getElementById('edit-roles-checkboxes');
        container.innerHTML = '';
        const rolesResponse = await fetch('/api/roles');
        const roles = await rolesResponse.json();
        roles.forEach(role => {
            const checked = user.roles.includes(role.name) ? 'checked' : '';
            const div = document.createElement('div');
            div.className = 'form-check';
            div.innerHTML = `
            <input class="form-check-input" type="checkbox" name="roleIds" value="${role.id}" id="edit-role-${role.id}" ${checked}>
            <label class="form-check-label" for="edit-role-${role.id}">${role.name}</label>
        `;
            container.appendChild(div);
        });

        const modal = new bootstrap.Modal(document.getElementById('editModal'));
        modal.show();
    }

    // Edit submit. Put mapping /api/users/id
    const editForm = document.getElementById('edit-user-form');

    editForm.addEventListener('submit', async (event) => {
        event.preventDefault();

        const roleIds = Array.from(
            editForm.querySelectorAll('input[name="roleIds"]:checked')
        ).map(checkbox => Number(checkbox.value));

        const id = editForm.id.value;

        const updatedUser = {
            name: editForm.name.value,
            lastName: editForm.lastName.value,
            age: editForm.age.value,
            username: editForm.username.value,
            password: editForm.password.value,
            roleIds: roleIds
        };
        //Проверка валидации ошибок.
        const response = await fetch(`/api/users/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(updatedUser)
        });

        if (response.ok) {
            bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
            loadUsers();
        } else {
            const errorMessage = await response.text();
            alert('Ошибка: ' + errorMessage);
        }
    });
    loadUsers();
    loadRoles();
</script>
</body>
</html>
