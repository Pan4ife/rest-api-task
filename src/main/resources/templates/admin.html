<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Страница админа</title>
</head>
<body>
<div th:replace="~{fragments :: main-nav}"></div>
<div class="d-flex">
    <div th:replace="~{fragments :: sidebar('admin')}"></div>
    <div class="p-3 flex-grow-1 text-bg-light"><h1>Admin panel</h1>
        <div th:if="${usernameError}" class="alert alert-danger" th:text="${usernameError}"></div>
        <!-----Tabs----->
        <div class="nav nav-tabs" id="nav-tab" role="tablist">
            <button class="nav-link" th:classappend="${activeTab == 'all-users' ? 'active': ''}"
                    id="nav-home-tab" data-bs-toggle="tab" data-bs-target="#nav-home"
                    type="button" role="tab" aria-controls="nav-home" aria-selected="true">All Users
            </button>
            <button class="nav-link" th:classappend="${activeTab == 'new-user' ? 'active': ''}"
                    id="nav-profile-tab" data-bs-toggle="tab" data-bs-target="#nav-profile"
                    type="button" role="tab" aria-controls="nav-profile" aria-selected="false">New User
            </button>
            <!-----Основной контент------>
        </div>
        <div class="tab-content" id="nav-tabContent">
            <div class="tab-pane fade" th:classappend="${activeTab == 'all-users' ? 'show active': ''}"
                 id="nav-home" role="tabpanel" aria-labelledby="nav-home-tab" tabindex="0">
                <div class="card">
                    <div class="card-header fw-bold">All users</div>
                    <div class="card-body">
                        <table class="table table-striped">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Last Name</th>
                                <th>Age</th>
                                <th>Username</th>
                                <th>Role</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="user : ${users}">
                                <td th:text="${user.id}"></td>
                                <td th:text="${user.name}"></td>
                                <td th:text="${user.lastName}"></td>
                                <td th:text="${user.age}"></td>
                                <td th:text="${user.username}"></td>
                                <td><span th:each="role: ${user.roles}" th:text="${role.name + ' '}"></span></td>
                                <!-----Modal Delete----->
                                <td>
                                    <button type="button" class="btn btn-danger"
                                            data-bs-toggle="modal" th:attr="data-bs-target=|#deleteModal-${user.id}|">
                                        Delete
                                    </button>
                                    <div class="modal fade" th:id="|deleteModal-${user.id}|" tabindex="-1">
                                        <div class="modal-dialog">
                                            <div class="modal-content">
                                                <div class="modal-header"><h5 class="modal-title">Delete user</h5>
                                                    <button type="button" class="btn-close" data-bs-dismiss="modal"
                                                            aria-label="Close"></button>
                                                </div>
                                                <div class="modal-body">
                                                    <div class="mb-3 w-50 mx-auto text-center">
                                                        <label class="form-label fw-bold">ID</label>
                                                        <input type="text"
                                                               class="form-control" th:value="${user.id}" disabled>
                                                    </div>
                                                    <div class="mb-3 w-50 mx-auto text-center">
                                                        <label class="form-label fw-bold">Name</label>
                                                        <input type="text"
                                                               class="form-control" th:value="${user.name}" disabled>
                                                    </div>
                                                    <div class="mb-3 w-50 mx-auto text-center">
                                                        <label class="form-label fw-bold">Last Name</label>
                                                        <input type="text"
                                                               class="form-control" th:value="${user.lastName}"
                                                               disabled>
                                                    </div>
                                                    <div class="mb-3 w-50 mx-auto text-center">
                                                        <label class="form-label fw-bold">Age</label>
                                                        <input type="text"
                                                               class="form-control" th:value="${user.age}" disabled>
                                                    </div>
                                                    <div class="mb-3 w-50 mx-auto text-center">
                                                        <label class="form-label fw-bold">Role</label>
                                                        <select multiple class="form-select" disabled>
                                                            <option th:each="role : ${user.roles}"
                                                                    th:text="${role.name}"></option>
                                                        </select>
                                                    </div>
                                                </div>
                                                <div class="modal-footer">
                                                    <button type="button" class="btn btn-secondary"
                                                            data-bs-dismiss="modal">Close
                                                    </button>
                                                    <form th:action="@{/admin/users/{id}/delete(id=${user.id})}"
                                                          method="post"
                                                          style="display:inline">
                                                        <button type="submit" class="btn btn-danger">Delete</button>
                                                    </form>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <!-----Edit----->
                                    <button type="button" class="btn btn-primary"
                                            data-bs-toggle="modal" th:attr="data-bs-target=|#editModal-${user.id}|">
                                        Edit
                                    </button>
                                    <div class="modal fade" th:id="|editModal-${user.id}|" tabindex="-1">
                                        <div class="modal-dialog">
                                            <div class="modal-content">
                                                <div class="modal-header"><h5 class="modal-title">Edit user</h5>
                                                    <button type="button" class="btn-close" data-bs-dismiss="modal"
                                                            aria-label="Close"></button>
                                                </div>
                                                <form th:action="@{/admin/users/{id}(id=${user.id})}"
                                                      method="post"
                                                      style="display:inline">
                                                    <div class="modal-body">
                                                        <div class="mb-3 w-50 mx-auto text-center">
                                                            <input type="hidden" name="id"
                                                                   class="form-control hidden" th:value="${user.id}">
                                                        </div>
                                                        <div class="mb-3 w-50 mx-auto text-center">
                                                            <label class="form-label fw-bold">Name</label>
                                                            <input type="text" name="name" th:value="${user.name}"
                                                                   class="form-control" required
                                                                   pattern="[A-Za-zА-Яа-я]+">
                                                        </div>
                                                        <div class="mb-3 w-50 mx-auto text-center">
                                                            <label class="form-label fw-bold">Last Name</label>
                                                            <input type="text" name="lastName"
                                                                   th:value="${user.lastName}"
                                                                   class="form-control" required
                                                                   pattern="[A-Za-zА-Яа-я]+">
                                                        </div>
                                                        <div class="mb-3 w-50 mx-auto text-center">
                                                            <label class="form-label fw-bold">Age</label>
                                                            <input type="number" name="age" th:value="${user.age}"
                                                                   class="form-control" required min="1" max="150">
                                                        </div>
                                                        <div class="mb-3 w-50 mx-auto text-center">
                                                            <label class="form-label fw-bold">Username</label>
                                                            <input type="text" name="username"
                                                                   th:value="${user.username}"
                                                                   class="form-control" required>
                                                        </div>
                                                        <div class="mb-3 w-50 mx-auto text-center">
                                                            <label class="form-label fw-bold">Password</label>
                                                            <input type="password" name="password" class="form-control">
                                                        </div>
                                                        <div class="mb-3 w-50 mx-auto text-center">
                                                            <label class="form-label fw-bold">Role</label>
                                                            <select multiple name="roleIds" class="form-select"
                                                                    required>
                                                                <option th:each="role : ${allRoles}"
                                                                        th:value="${role.id}"
                                                                        th:text="${role.name}"
                                                                        th:selected="${user.roles.contains(role)}"></option>
                                                            </select>
                                                        </div>
                                                    </div>
                                                    <div class="modal-footer">
                                                        <button type="button" class="btn btn-secondary"
                                                                data-bs-dismiss="modal">Close
                                                        </button>
                                                        <button type="submit" class="btn btn-info">Edit</button>
                                                    </div>
                                                </form>
                                            </div>
                                        </div>
                                    </div>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            <!-----New user----->
            <div class="tab-pane fade" th:classappend="${activeTab == 'new-user' ? ' show active': ''}"
                 id="nav-profile" role="tabpanel" aria-labelledby="nav-profile-tab" tabindex="0">
                <div class="card">
                    <div class="card-header"> Add new user</div>
                    <div class="card-body">
                        <form th:action="@{/admin/users}" th:object="${user}" method="post">
                            <div class="mb-3 w-25 mx-auto text-center">
                                <label class="form-label fw-bold">Name</label>
                                <input type="text" th:field="*{name}" pattern="[A-Za-zА-Яа-я]+"
                                       class="form-control">
                                <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}"
                                      style="color: red"></span>
                            </div>

                            <div class="mb-3 w-25 mx-auto text-center">
                                <label class="form-label fw-bold">Last Name</label>
                                <input type="text" th:field="*{lastName}" pattern="[A-Za-zА-Яа-я]+"
                                       class="form-control">
                                <span th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"
                                      style="color: red"></span>
                            </div>

                            <div class="mb-3 w-25 mx-auto text-center">
                                <label class="form-label fw-bold">Age</label>
                                <input type="number" th:field="*{age}" class="form-control">
                                <span th:if="${#fields.hasErrors('age')}" th:errors="*{age}" style="color: red"></span>
                            </div>

                            <div class="mb-3 w-25 mx-auto text-center">
                                <label class="form-label fw-bold">Username</label>
                                <input type="text" th:field="*{username}" class="form-control">
                                <span th:if="${#fields.hasErrors('username')}" th:errors="*{username}"
                                      style="color: red"></span>
                            </div>

                            <div class="mb-3 w-25 mx-auto text-center">
                                <label class="form-label fw-bold">Password</label>
                                <input type="password" th:field="*{password}" class="form-control">
                                <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}"
                                      style="color: red"></span>

                            </div>

                            <div class="mb-3 w-25 mx-auto">
                                <label class="form-label fw-bold d-block text-center">Role</label>
                                <div class="form-check" th:each="role : ${allRoles}">
                                    <input class="form-check-input" type="checkbox" name="roleIds" th:value="${role.id}">
                                    <label class="form-check-label" th:text="${role.name}"></label>
                                </div>
                            </div>

                            <div class="text-center" th:if="${#fields.hasGlobalErrors()}">
                                <span th:each="err : ${#fields.globalErrors()}"
                                      th:text="${err}"
                                      style="color: red"></span>
                            </div>
                            <div class="d-flex justify-content-center">
                            <button type="submit" class="btn btn-success">Add new user</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
