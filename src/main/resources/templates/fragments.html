<!DOCTYPE html>
<html lang="en" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<!-----NavBar----->
<nav th:fragment="main-nav" class="navbar bg-dark border-bottom border-body" data-bs-theme="dark">
    <div class="container-fluid">
        <span class="navbar-brand">
        <span sec:authentication="name"></span> with Roles
        [<span th:each="role : ${#authentication.authorities}"
               th:if="${role.authority.startsWith('ROLE_')}"
               th:text="${#strings.replace(role.authority, 'ROLE_', '')}"></span>]
        </span>
        <form th:action="@{/logout}" method="post">
            <button class="btn btn-secondary"> Logout</button>
        </form>
    </div>
</nav>

<!-----Sidebar----->
<div th:fragment="sidebar(activePage)" class="sidebar sidebar-narrow border-end bg-white vh-100"
     style="width: 200px">
    <div>
        <div sec:authorize="hasRole('ADMIN')">
            <a th:class="${activePage == 'admin' ? 'btn btn-primary w-100' : 'btn btn-outline-primary w-100'}"
               th:href="@{/admin/users}">Admin</a>
        </div>
        <div sec:authorize="hasAnyRole('ADMIN', 'USER')">
            <a th:class="${activePage == 'user' ? 'btn btn-primary w-100' : 'btn btn-outline-primary w-100'}"
               th:href="@{/user}">User</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
